name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.6'
          
      - run: flutter create --platforms android --project-name prototype .
          
      - name: Patch minSdkVersion and Kotlin
        run: |
          # Patch minSdkVersion in app/build.gradle
          sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # Patch Kotlin version in settings.gradle (Flutter 3.16+ template style)
          sed -i 's/id "org.jetbrains.kotlin.android" version "[0-9.]*" apply false/id "org.jetbrains.kotlin.android" version "1.9.0" apply false/g' android/settings.gradle
          
          # Debug: show the modified lines (don't fail if not found)
          grep "minSdkVersion" android/app/build.gradle || true
          grep "org.jetbrains.kotlin.android" android/settings.gradle || true
          
      - run: flutter pub get
      
      - name: Print Auto-Generated Keystore SHA-1
        run: |
          echo "Checking Gradlew Signing Report..."
          cd android && ./gradlew signingReport | grep "SHA1" || true
          
          echo "Checking Keytool Fallback..."
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep "SHA1" || true
      
      - run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
